name: Build

# 在 GitHub 的免费云端 Mac 上编译，验证 App 能不能通过编译（无需本地 Mac）。
# 每次 push 或手动点「Run workflow」都会跑。失败时打开这次运行看 Build 步骤的红色报错。
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # Secrets.xcconfig 不进仓库；编译只需要占位 key（真实调用才需要真 key）。
      - name: Create placeholder Secrets.xcconfig
        run: echo 'TRIPO_API_KEY = ci_placeholder' > Config/Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project PingpingApp.xcodeproj \
            -scheme PingpingApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
