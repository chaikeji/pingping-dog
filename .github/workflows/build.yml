name: Build

# 在 GitHub 的免费云端 Mac 上编译，验证 App 能不能通过编译（无需本地 Mac）。
# 每次 push 或手动点「Run workflow」都会跑。失败时打开这次运行看 Build 步骤的红色报错。
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      # 云端 Mac 预装了不受信任的 aws/tap，会触发 Homebrew 的 tap 信任检查而报错；
      # 关掉这个检查，brew 才能正常从 homebrew-core 装 xcodegen。
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # Mapbox 的 SDK 不是公开下载的，SPM 解析前必须先写 ~/.netrc。
      # 缺 secret 的话这里直接失败并说清楚原因，比让 SPM 报一堆看不懂的 401 强。
      - name: Write ~/.netrc for Mapbox SPM
        env:
          MAPBOX_DOWNLOAD_TOKEN: ${{ secrets.MAPBOX_DOWNLOAD_TOKEN }}
        run: |
          if [ -z "$MAPBOX_DOWNLOAD_TOKEN" ]; then
            echo "::error::仓库 Secrets 里没有 MAPBOX_DOWNLOAD_TOKEN（sk. 开头的下载 token），Mapbox SDK 拉不下来。"
            exit 1
          fi
          printf 'machine api.mapbox.com\nlogin mapbox\npassword %s\n' "$MAPBOX_DOWNLOAD_TOKEN" > ~/.netrc
          chmod 600 ~/.netrc
          echo "已写入 ~/.netrc，token 长度 = ${#MAPBOX_DOWNLOAD_TOKEN}"

      # Secrets.xcconfig 不进仓库；编译只需要占位 key（真实调用才需要真 key）。
      # Mapbox 的 pk. token 编译期只是塞进 Info.plist，占位值不影响能不能编过。
      - name: Create placeholder Secrets.xcconfig
        env:
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: |
          echo 'TRIPO_API_KEY = ci_placeholder' > Config/Secrets.xcconfig
          echo "MAPBOX_PUBLIC_TOKEN = ${MAPBOX_PUBLIC_TOKEN:-pk.ci_placeholder}" >> Config/Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project PingpingApp.xcodeproj \
            -scheme PingpingApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log

      # 失败时把所有编译报错单独拎出来打印，方便复制。
      - name: Show compile errors
        if: failure()
        run: |
          echo "==================== 编译报错 ===================="
          grep -nE "error:" build.log | head -200 || echo "(没找到 error: 行，可能是链接/签名等其它错误)"
          echo "================================================="
