name: PingpingApp
options:
  bundleIdPrefix: com.pingping
  deploymentTarget:
    iOS: "18.0"
packages:
  # Mapbox 的二进制包不是公开下载的：CI 上要先写 ~/.netrc（见 build.yml / ipa.yml），
  # SPM 解析这一步才拿得到 artifact。
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios
    from: 11.0.0
targets:
  PingpingApp:
    type: application
    platform: iOS
    sources:
      - PingpingApp
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: PingpingApp/Info.plist
      properties:
        CFBundleDisplayName: 平平
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: 记录平平的遛狗轨迹需要访问你的位置
        NSLocationAlwaysAndWhenInUseUsageDescription: 为了在锁屏和后台也能完整记录遛狗轨迹，需要始终定位权限
        NSCameraUsageDescription: 拍摄平平和狗朋友的照片
        NSPhotoLibraryUsageDescription: 选择照片用于档案和狗朋友建档
        NSPhotoLibraryAddUsageDescription: 保存本次遛狗的总结截图到相册
        UIBackgroundModes:
          - location
        TripoAPIKey: $(TRIPO_API_KEY)
        # Mapbox SDK 启动时从这里读公开 token（pk. 开头）。
        MBXAccessToken: $(MAPBOX_PUBLIC_TOKEN)
    dependencies:
      - package: MapboxMaps
        product: MapboxMaps
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.pingping.app
schemes:
  PingpingApp:
    build:
      targets:
        PingpingApp: all
